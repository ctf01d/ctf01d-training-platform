services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ctf01d}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ctf01d_production
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${APP_IMAGE:-ghcr.io/ctf01d/ctf01d-training-platform:latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-ctf01d}:${POSTGRES_PASSWORD}@db:5432/ctf01d_production?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_TTL_HOURS: "${JWT_TTL_HOURS:-24}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-https://ctf01d-keva.ru}"
      STORAGE_DIR: /data/storage
      STORAGE_MAX_UPLOAD_BYTES: "${STORAGE_MAX_UPLOAD_BYTES:-209715200}"
      RUN_MIGRATIONS: "${RUN_MIGRATIONS:-true}"
    expose:
      - "8080"
    volumes:
      - storage-data:/data/storage
      - web-dist:/web-dist
    user: "0:0"
    entrypoint: ["sh", "-c", "cp -r /app/web/dist/. /web-dist/ && chown -R app:app /web-dist/ /data/storage && exec su-exec app:app ./ctf01d-server"]

  reverse-proxy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL is required}
    ports:
      - "80:80"
      - "443:443"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - web-dist:/srv/web:ro

volumes:
  db-data:
  caddy-data:
  caddy-config:
  storage-data:
  web-dist:
