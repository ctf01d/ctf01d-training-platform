stages:
  - lint
  - test
  - build

variables:
  GOPATH: "$CI_PROJECT_DIR/.go"

.go-cache: &go-cache
  before_script:
    - mkdir -p .go
  cache:
    key: "go-${CI_COMMIT_REF_SLUG}"
    paths:
      - .go/pkg/mod/

go-lint:
  image: golangci/golangci-lint:latest
  stage: lint
  before_script:
    - mkdir -p .go
  script:
    - golangci-lint run --config configs/golangci.yaml ./...

go-test:
  image: golang:1.26
  stage: test
  services:
    - postgres:16
  variables:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: ctf01d_test
    TEST_DATABASE_URL: postgres://postgres:postgres@postgres:5432/ctf01d_test?sslmode=disable
  <<: *go-cache
  script:
    - go test ./...

web-typecheck:
  image: node:22
  stage: test
  cache:
    key: "node-${CI_COMMIT_REF_SLUG}"
    paths:
      - web/node_modules/
  script:
    - cd web && npm ci && npm run typecheck

docker-build:
  image: docker:27
  stage: build
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -f docker/Dockerfile --build-arg VERSION=$CI_COMMIT_SHA .
