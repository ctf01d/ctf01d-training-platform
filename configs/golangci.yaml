run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - gofumpt
    - gci
    - revive

linters-settings:
  gci:
    sections:
      - standard
      - default
      - prefix(github.com/ctf01d/ctf01d-training-platform)
  gofumpt:
    extra-rules: true
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  exclude-dirs:
    - gen/
    - internal/repository/db/
