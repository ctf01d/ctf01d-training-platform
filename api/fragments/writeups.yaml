tags:
  - name: writeups
    description: Team writeups for games

components:
  schemas:
    Writeup:
      allOf:
        - $ref: '#/components/schemas/Timestamped'
        - type: object
          required:
            - id
            - game_id
            - team_id
            - title
            - url
          properties:
            id:
              type: integer
              format: int64
            game_id:
              type: integer
              format: int64
            team_id:
              type: integer
              format: int64
            title:
              type: string
            url:
              type: string
              format: uri
    WriteupCreate:
      type: object
      required:
        - game_id
        - team_id
        - title
        - url
      properties:
        game_id:
          type: integer
          format: int64
        team_id:
          type: integer
          format: int64
        title:
          type: string
          maxLength: 255
        url:
          type: string
          format: uri
    WriteupList:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Writeup'

paths:
  /writeups:
    get:
      operationId: listWriteups
      tags:
        - writeups
      summary: List writeups
      security:
        - BearerAuth: []
      parameters:
        - name: game_id
          in: query
          schema:
            type: integer
            format: int64
        - name: team_id
          in: query
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of writeups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteupList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createWriteup
      tags:
        - writeups
      summary: Create a writeup
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WriteupCreate'
      responses:
        '201':
          description: Writeup created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Writeup'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /writeups/{id}:
    get:
      operationId: getWriteup
      tags:
        - writeups
      summary: Get a writeup by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Writeup details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Writeup'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      operationId: deleteWriteup
      tags:
        - writeups
      summary: Delete a writeup
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Writeup deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
