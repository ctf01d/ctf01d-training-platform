tags:
  - name: users
    description: User management

components:
  schemas:
    User:
      allOf:
        - $ref: '#/components/schemas/Timestamped'
        - type: object
          required:
            - id
            - user_name
            - display_name
            - role
            - rating
          properties:
            id:
              type: integer
              format: int64
            user_name:
              type: string
            display_name:
              type: string
            role:
              type: string
              enum:
                - guest
                - player
                - admin
            rating:
              type: integer
            avatar_url:
              type: string
              nullable: true
    UserCreate:
      type: object
      required:
        - user_name
        - display_name
        - password
      properties:
        user_name:
          type: string
          pattern: '^[a-zA-Z0-9_]+$'
        display_name:
          type: string
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum:
            - guest
            - player
            - admin
          default: guest
        avatar_url:
          type: string
          nullable: true
    UserUpdate:
      type: object
      properties:
        display_name:
          type: string
        avatar_url:
          type: string
          nullable: true
        password:
          type: string
          minLength: 6
    UserList:
      type: object
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        pagination:
          $ref: '#/components/schemas/Pagination'

paths:
  /users:
    get:
      operationId: listUsers
      tags:
        - users
      summary: List users
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createUser
      tags:
        - users
      summary: Create a user
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/{id}:
    get:
      operationId: getUser
      tags:
        - users
      summary: Get a user by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      operationId: updateUser
      tags:
        - users
      summary: Update a user
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      operationId: deleteUser
      tags:
        - users
      summary: Delete a user
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: User deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
