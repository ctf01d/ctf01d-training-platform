components:
  schemas:
    ServiceArchiveMeta:
      type: object
      properties:
        size:
          type: integer
          format: int64
          nullable: true
        sha256:
          type: string
          nullable: true
        downloaded_at:
          type: string
          format: date-time
          nullable: true
    Service:
      allOf:
        - $ref: '#/components/schemas/Timestamped'
        - type: object
          required:
            - id
            - name
            - public
            - check_status
            - ctf01d_training
            - ports
            - tech_stack
          properties:
            id:
              type: integer
              format: int64
            name:
              type: string
            public_description:
              type: string
              nullable: true
            private_description:
              type: string
              nullable: true
            author:
              type: string
              nullable: true
            copyright:
              type: string
              nullable: true
            avatar_url:
              type: string
              nullable: true
            public:
              type: boolean
            service_archive_url:
              type: string
              nullable: true
            checker_archive_url:
              type: string
              nullable: true
            writeup_url:
              type: string
              nullable: true
            exploits_url:
              type: string
              nullable: true
            check_status:
              type: string
              enum:
                - unknown
                - ok
                - failed
            checked_at:
              type: string
              format: date-time
              nullable: true
            service_archive:
              $ref: '#/components/schemas/ServiceArchiveMeta'
            checker_archive:
              $ref: '#/components/schemas/ServiceArchiveMeta'
            ctf01d_training:
              type: object
              nullable: true
            ports:
              type: array
              items:
                type: integer
                format: int32
            tech_stack:
              type: array
              items:
                type: string
    ServiceCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        public_description:
          type: string
        private_description:
          type: string
        author:
          type: string
        copyright:
          type: string
        avatar_url:
          type: string
        public:
          type: boolean
        service_archive_url:
          type: string
        checker_archive_url:
          type: string
        writeup_url:
          type: string
        exploits_url:
          type: string
        ctf01d_training:
          type: object
        ports:
          type: array
          items:
            type: integer
            format: int32
        tech_stack:
          type: array
          items:
            type: string
    ServiceUpdate:
      type: object
      properties:
        name:
          type: string
        public_description:
          type: string
        private_description:
          type: string
        author:
          type: string
        copyright:
          type: string
        avatar_url:
          type: string
        public:
          type: boolean
        service_archive_url:
          type: string
        checker_archive_url:
          type: string
        writeup_url:
          type: string
        exploits_url:
          type: string
        ctf01d_training:
          type: object
        ports:
          type: array
          items:
            type: integer
            format: int32
        tech_stack:
          type: array
          items:
            type: string
    ServiceList:
      type: object
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Service'
        pagination:
          $ref: '#/components/schemas/Pagination'
    GithubImportRequest:
      type: object
      required:
        - repo_url
      properties:
        repo_url:
          type: string
        ref:
          type: string
        subdir:
          type: string
    ImportResult:
      type: object
      required:
        - service
        - warnings
      properties:
        service:
          $ref: '#/components/schemas/Service'
        warnings:
          type: array
          items:
            type: string
    ServiceImportValidationItem:
      type: object
      required:
        - id
        - title
        - status
        - message
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum:
            - ok
            - warning
            - error
        message:
          type: string
    ServiceImportPreview:
      type: object
      required:
        - source
        - valid
        - service_name
        - expected_repository_name
        - has_dev_directory
        - requirements
        - warnings
      properties:
        source:
          type: string
          enum:
            - github
            - zip
        valid:
          type: boolean
        service_name:
          type: string
        repository_owner:
          type: string
        repository_name:
          type: string
        expected_repository_name:
          type: string
        root_directory:
          type: string
        service_directory:
          type: string
        checker_directory:
          type: string
        has_dev_directory:
          type: boolean
        existing_service_id:
          type: integer
          format: int64
          nullable: true
        requirements:
          type: array
          items:
            $ref: '#/components/schemas/ServiceImportValidationItem'
        warnings:
          type: array
          items:
            type: string
paths:
  /services:
    get:
      operationId: listServices
      tags:
        - services
      summary: List services
      security: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: public
          in: query
          schema:
            type: boolean
        - name: q
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of services
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: List services
    post:
      operationId: createService
      tags:
        - services
      summary: Create a service
      x-required-role: player
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceCreate'
      responses:
        '201':
          description: Service created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Create a service
  /services/{id}:
    get:
      operationId: getService
      tags:
        - services
      summary: Get a service by ID
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Service details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Get a service by ID
    patch:
      operationId: updateService
      tags:
        - services
      summary: Update a service
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceUpdate'
      responses:
        '200':
          description: Service updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Update a service
    delete:
      operationId: deleteService
      tags:
        - services
      summary: Delete a service
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Service deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Delete a service
  /services/{id}/toggle-public:
    post:
      operationId: toggleServicePublic
      tags:
        - services
      summary: Toggle service public flag
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Service toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Toggle service public flag
  /services/{id}/check-checker:
    post:
      operationId: checkServiceChecker
      tags:
        - services
      summary: Run checker inspection
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Checker inspected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Run checker inspection
  /services/{id}/redownload:
    post:
      operationId: redownloadServiceArchives
      tags:
        - services
      summary: Re-download service and checker archives from URLs
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Archives re-downloaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Re-download service and checker archives from URLs
  /services/{id}/upload-archives:
    post:
      operationId: uploadServiceArchives
      tags:
        - services
      summary: Upload service and/or checker archives
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                service_archive:
                  type: string
                  format: binary
                checker_archive:
                  type: string
                  format: binary
      responses:
        '200':
          description: Archives uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Upload service and/or checker archives
  /services/{id}/download/{kind}:
    get:
      operationId: downloadServiceArchive
      tags:
        - services
      summary: Download service or checker archive
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: kind
          in: path
          required: true
          schema:
            type: string
            enum:
              - service
              - checker
      responses:
        '200':
          description: Archive file
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Download service or checker archive
  /services/import/github:
    post:
      operationId: importServiceFromGithub
      tags:
        - services
      summary: Import a service from GitHub
      x-required-role: player
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GithubImportRequest'
      responses:
        '201':
          description: Service imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResult'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Import a service from GitHub
  /services/import/github/preview:
    post:
      operationId: previewServiceGithubImport
      tags:
        - services
      summary: Preview and validate a GitHub service import
      x-required-role: player
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GithubImportRequest'
      responses:
        '200':
          description: Import preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceImportPreview'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Preview and validate a GitHub service import
  /services/import/zip:
    post:
      operationId: importServiceFromZip
      tags:
        - services
      summary: Import a service from a ZIP file
      x-required-role: player
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - archive
              properties:
                archive:
                  type: string
                  format: binary
      responses:
        '201':
          description: Service imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResult'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Import a service from a ZIP file
  /services/import/zip/preview:
    post:
      operationId: previewServiceZipImport
      tags:
        - services
      summary: Preview and validate a ZIP service import
      x-required-role: player
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - archive
              properties:
                archive:
                  type: string
                  format: binary
      responses:
        '200':
          description: Import preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceImportPreview'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Preview and validate a ZIP service import
