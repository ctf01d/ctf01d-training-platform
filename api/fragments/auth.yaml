components:
  schemas:
    LoginRequest:
      type: object
      required:
        - user_name
        - password
      properties:
        user_name:
          type: string
        password:
          type: string
    LoginResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
paths:
  /session:
    post:
      operationId: login
      tags:
        - auth
      summary: Login
      x-required-role: public
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Login
    delete:
      operationId: logout
      tags:
        - auth
      summary: Logout
      x-required-role: authenticated
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Logout
  /profile:
    get:
      operationId: getProfile
      tags:
        - auth
      summary: Get current user profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Get current user profile
    patch:
      operationId: updateProfile
      tags:
        - auth
      summary: Update current user profile
      x-required-role: authenticated
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdate'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
      description: Update current user profile
  /profile/avatar:
    post:
      operationId: uploadProfileAvatar
      tags:
        - auth
      summary: Upload current user's avatar
      x-required-role: authenticated
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - avatar
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar uploaded; the image is scaled and stored server-side
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Upload an avatar image for the current user
  /profile/sessions:
    get:
      operationId: listProfileSessions
      tags:
        - auth
      summary: List current user's active sessions
      x-required-role: authenticated
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Active sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSessionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: List active sessions for the current user
