tags:
  - name: teams
    description: Team management

components:
  schemas:
    Team:
      allOf:
        - $ref: '#/components/schemas/Timestamped'
        - type: object
          required:
            - id
            - name
          properties:
            id:
              type: integer
              format: int64
            name:
              type: string
            description:
              type: string
              nullable: true
            website:
              type: string
              nullable: true
            avatar_url:
              type: string
              nullable: true
            captain_id:
              type: integer
              format: int64
              nullable: true
            university_id:
              type: integer
              format: int64
              nullable: true
    TeamCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        website:
          type: string
        avatar_url:
          type: string
        university_id:
          type: integer
          format: int64
          nullable: true
    TeamUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        website:
          type: string
        avatar_url:
          type: string
        university_id:
          type: integer
          format: int64
          nullable: true
    TeamList:
      type: object
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Team'
        pagination:
          $ref: '#/components/schemas/Pagination'
    InviteRequest:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: integer
          format: int64

paths:
  /teams:
    get:
      operationId: listTeams
      tags:
        - teams
      summary: List teams
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: List of teams
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createTeam
      tags:
        - teams
      summary: Create a team
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamCreate'
      responses:
        '201':
          description: Team created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /teams/{id}:
    get:
      operationId: getTeam
      tags:
        - teams
      summary: Get a team by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Team details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      operationId: updateTeam
      tags:
        - teams
      summary: Update a team
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamUpdate'
      responses:
        '200':
          description: Team updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      operationId: deleteTeam
      tags:
        - teams
      summary: Delete a team
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Team deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /teams/{id}/join-request:
    post:
      operationId: requestJoinTeam
      tags:
        - teams
      summary: Request to join a team
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '201':
          description: Join request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMembership'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /teams/{id}/invite:
    post:
      operationId: inviteToTeam
      tags:
        - teams
      summary: Invite a user to a team
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteRequest'
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMembership'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /teams/{id}/members:
    get:
      operationId: listTeamMembers
      tags:
        - teams
      summary: List team members
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of team memberships
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMembershipList'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /teams/{id}/events:
    get:
      operationId: listTeamEvents
      tags:
        - teams
      summary: List team membership events
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: List of membership events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMembershipEventList'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
