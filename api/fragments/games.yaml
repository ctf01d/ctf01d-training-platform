components:
  schemas:
    Game:
      allOf:
        - $ref: '#/components/schemas/Timestamped'
        - type: object
          required:
            - id
            - finalized
          properties:
            id:
              type: integer
              format: int64
            name:
              type: string
              nullable: true
            organizer:
              type: string
              nullable: true
            starts_at:
              type: string
              format: date-time
              nullable: true
            ends_at:
              type: string
              format: date-time
              nullable: true
            avatar_url:
              type: string
              nullable: true
            site_url:
              type: string
              nullable: true
            ctftime_url:
              type: string
              nullable: true
            finalized:
              type: boolean
            finalized_at:
              type: string
              format: date-time
              nullable: true
            registration_opens_at:
              type: string
              format: date-time
              nullable: true
            registration_closes_at:
              type: string
              format: date-time
              nullable: true
            scoreboard_opens_at:
              type: string
              format: date-time
              nullable: true
            scoreboard_closes_at:
              type: string
              format: date-time
              nullable: true
            vpn_url:
              type: string
              nullable: true
            vpn_config_url:
              type: string
              nullable: true
            access_instructions:
              type: string
              nullable: true
            access_secret:
              type: string
              nullable: true
            published:
              type: boolean
            theme:
              type: string
              nullable: true
            requirements:
              type: string
              nullable: true
            status:
              type: string
              enum:
                - upcoming
                - ongoing
                - past
                - unknown
              readOnly: true
            registration_status:
              type: string
              enum:
                - unscheduled
                - upcoming
                - open
                - closed
              readOnly: true
            scoreboard_status:
              type: string
              enum:
                - always
                - upcoming
                - open
                - closed
              readOnly: true
    GameCreate:
      type: object
      properties:
        name:
          type: string
        organizer:
          type: string
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        avatar_url:
          type: string
        site_url:
          type: string
        ctftime_url:
          type: string
        registration_opens_at:
          type: string
          format: date-time
        registration_closes_at:
          type: string
          format: date-time
        scoreboard_opens_at:
          type: string
          format: date-time
        scoreboard_closes_at:
          type: string
          format: date-time
        vpn_url:
          type: string
        vpn_config_url:
          type: string
        access_instructions:
          type: string
        access_secret:
          type: string
        published:
          type: boolean
        theme:
          type: string
        requirements:
          type: string
    GameUpdate:
      type: object
      properties:
        name:
          type: string
        organizer:
          type: string
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        avatar_url:
          type: string
        site_url:
          type: string
        ctftime_url:
          type: string
        registration_opens_at:
          type: string
          format: date-time
        registration_closes_at:
          type: string
          format: date-time
        scoreboard_opens_at:
          type: string
          format: date-time
        scoreboard_closes_at:
          type: string
          format: date-time
        vpn_url:
          type: string
        vpn_config_url:
          type: string
        access_instructions:
          type: string
        access_secret:
          type: string
        theme:
          type: string
        requirements:
          type: string
    GameList:
      type: object
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Game'
        pagination:
          $ref: '#/components/schemas/Pagination'
    GameServiceLink:
      type: object
      required:
        - service_id
        - status
      properties:
        service_id:
          type: integer
          format: int64
        status:
          type: string
    Ctf01dExportOptions:
      type: object
      properties:
        port:
          type: integer
          default: 8080
        include_html:
          type: boolean
          default: true
        include_compose:
          type: boolean
          default: true
        html_source_path:
          type: string
        flag_ttl_min:
          type: integer
          default: 1
        basic_attack_cost:
          type: integer
          default: 1
        defence_cost:
          type: number
          default: 1.0
        coffee_break_start:
          type: string
          format: date-time
          nullable: true
        coffee_break_end:
          type: string
          format: date-time
          nullable: true
        warnings:
          type: array
          items:
            type: string
    Ctf01dExportRequest:
      type: object
      properties:
        prefix:
          type: string
        include_html:
          type: boolean
          default: true
        html_source_path:
          type: string
        include_compose:
          type: boolean
          default: true
        compose_project:
          type: string
        port:
          type: integer
          default: 8080
        htmlfolder:
          type: string
          default: './html'
        random:
          type: boolean
          default: false
        flag_ttl_min:
          type: integer
          default: 1
          minimum: 1
          maximum: 25
        basic_attack_cost:
          type: integer
          default: 1
          minimum: 1
          maximum: 500
        defence_cost:
          type: number
          default: 1.0
        coffee_break_start:
          type: string
          format: date-time
          nullable: true
        coffee_break_end:
          type: string
          format: date-time
          nullable: true
    Ctf01dExportError:
      type: object
      required:
        - code
        - errors
      properties:
        code:
          type: string
        message:
          type: string
        errors:
          type: array
          items:
            type: string
paths:
  /games:
    get:
      operationId: listGames
      tags:
        - games
      summary: List games
      security: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: q
          in: query
          schema:
            type: string
        - name: published
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: List of games
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: List games
    post:
      operationId: createGame
      tags:
        - games
      summary: Create a game
      x-required-role: player
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameCreate'
      responses:
        '201':
          description: Game created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Create a game
  /games/{id}:
    get:
      operationId: getGame
      tags:
        - games
      summary: Get a game by ID
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Game details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Get a game by ID
    patch:
      operationId: updateGame
      tags:
        - games
      summary: Update a game
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameUpdate'
      responses:
        '200':
          description: Game updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Update a game
    delete:
      operationId: deleteGame
      tags:
        - games
      summary: Delete a game
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Game deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Delete a game
  /games/{id}/services:
    get:
      operationId: listGameServices
      tags:
        - games
      summary: List services linked to a game
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of linked services with planning status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GameServiceLink'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: List services linked to a game
    post:
      operationId: addGameService
      tags:
        - games
      summary: Link a service to a game
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - service_id
              properties:
                service_id:
                  type: integer
                  format: int64
                status:
                  type: string
      responses:
        '200':
          description: Service linked
        '409':
          $ref: '#/components/responses/Conflict'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Link a service to a game
  /games/{id}/services/{service_id}:
    patch:
      operationId: setGameServiceStatus
      tags:
        - games
      summary: Set the planning status of a linked service
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: service_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
      responses:
        '204':
          description: Status updated
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Set the planning status of a linked service
    delete:
      operationId: removeGameService
      tags:
        - games
      summary: Unlink a service from a game
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: service_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Service unlinked
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Unlink a service from a game
  /games/{id}/publish:
    post:
      operationId: publishGame
      tags:
        - games
      summary: Publish a planning game into the games section
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Game published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Publish a planning game into the games section
  /games/{id}/finalize:
    post:
      operationId: finalizeGame
      tags:
        - games
      summary: Finalize game results
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Game finalized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Finalize game results
  /games/{id}/unfinalize:
    post:
      operationId: unfinalizeGame
      tags:
        - games
      summary: Unfinalize game results
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Game unfinalized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Unfinalize game results
  /games/{id}/export/ctf01d/options:
    get:
      operationId: getCtf01dExportOptions
      tags:
        - games
      summary: Get ctf01d export options and warnings for a game
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Export options with warnings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ctf01dExportOptions'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Get ctf01d export options and warnings for a game
  /games/{id}/export/ctf01d:
    post:
      operationId: exportCtf01d
      tags:
        - games
      summary: Export game as ctf01d zip archive
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Ctf01dExportRequest'
      responses:
        '200':
          description: ctf01d zip archive
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '422':
          description: Export validation errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ctf01dExportError'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Export game as ctf01d zip archive
