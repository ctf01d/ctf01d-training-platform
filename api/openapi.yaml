openapi: 3.0.3
info:
  title: CTF01D Training Platform API
  description: |
    REST API for the CTF01D training platform: users, teams, universities,
    games (competitions), services, results, scoreboards and writeups.
  version: 1.0.0
  contact:
    name: CTF01D
    url: https://github.com/ctf01d
servers:
  - url: http://localhost:8080
tags:
  - name: auth
    description: Authentication and session management
  - name: users
    description: User accounts
  - name: universities
    description: Universities
  - name: teams
    description: Teams and rosters
  - name: team-memberships
    description: Team membership requests, invites and roles
  - name: games
    description: Games (competitions) and their configuration
  - name: game-teams
    description: Game participants and per-game team settings
  - name: services
    description: Vulnerable services and checkers
  - name: results
    description: Per-game team results
  - name: scoreboard
    description: Scoreboards and standings
  - name: writeups
    description: Team writeups for games
paths:
  /session:
    post:
      operationId: login
      tags:
        - auth
      summary: Login
      x-required-role: public
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Login
    delete:
      operationId: logout
      tags:
        - auth
      summary: Logout
      x-required-role: authenticated
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Logout
  /profile:
    get:
      operationId: getProfile
      tags:
        - auth
      summary: Get current user profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Get current user profile
    patch:
      operationId: updateProfile
      tags:
        - auth
      summary: Update current user profile
      x-required-role: authenticated
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdate'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
      description: Update current user profile
  /profile/password:
    put:
      operationId: changeProfilePassword
      tags:
        - auth
      summary: Change current user's password
      x-required-role: authenticated
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordUpdate'
      responses:
        '204':
          description: Password changed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
      description: Change the current user's password without affecting other profile fields
  /profile/avatar:
    post:
      operationId: uploadProfileAvatar
      tags:
        - auth
      summary: Upload current user's avatar
      x-required-role: authenticated
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - avatar
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar uploaded; the image is scaled and stored server-side
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Upload an avatar image for the current user
  /profile/sessions:
    get:
      operationId: listProfileSessions
      tags:
        - auth
      summary: List current user's active sessions
      x-required-role: authenticated
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Active sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSessionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: List active sessions for the current user
  /games:
    get:
      operationId: listGames
      tags:
        - games
      summary: List games
      security: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: q
          in: query
          schema:
            type: string
        - name: published
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: List of games
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: List games
    post:
      operationId: createGame
      tags:
        - games
      summary: Create a game
      x-required-role: player
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameCreate'
      responses:
        '201':
          description: Game created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Create a game
  /games/{id}:
    get:
      operationId: getGame
      tags:
        - games
      summary: Get a game by ID
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Game details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Get a game by ID
    patch:
      operationId: updateGame
      tags:
        - games
      summary: Update a game
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameUpdate'
      responses:
        '200':
          description: Game updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Update a game
    delete:
      operationId: deleteGame
      tags:
        - games
      summary: Delete a game
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Game deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Delete a game
  /games/{id}/services:
    get:
      operationId: listGameServices
      tags:
        - games
      summary: List services linked to a game
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of linked services with planning status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GameServiceLink'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: List services linked to a game
    post:
      operationId: addGameService
      tags:
        - games
      summary: Link a service to a game
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - service_id
              properties:
                service_id:
                  type: integer
                  format: int64
                status:
                  type: string
      responses:
        '200':
          description: Service linked
        '409':
          $ref: '#/components/responses/Conflict'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Link a service to a game
  /games/{id}/services/{service_id}:
    patch:
      operationId: setGameServiceStatus
      tags:
        - games
      summary: Set the planning status of a linked service
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: service_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
      responses:
        '204':
          description: Status updated
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Set the planning status of a linked service
    delete:
      operationId: removeGameService
      tags:
        - games
      summary: Unlink a service from a game
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: service_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Service unlinked
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Unlink a service from a game
  /games/{id}/publish:
    post:
      operationId: publishGame
      tags:
        - games
      summary: Publish a planning game into the games section
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Game published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Publish a planning game into the games section
  /games/{id}/finalize:
    post:
      operationId: finalizeGame
      tags:
        - games
      summary: Finalize game results
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Game finalized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Finalize game results
  /games/{id}/unfinalize:
    post:
      operationId: unfinalizeGame
      tags:
        - games
      summary: Unfinalize game results
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Game unfinalized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Unfinalize game results
  /games/{id}/export/ctf01d/options:
    get:
      operationId: getCtf01dExportOptions
      tags:
        - games
      summary: Get ctf01d export options and warnings for a game
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Export options with warnings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ctf01dExportOptions'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Get ctf01d export options and warnings for a game
  /games/{id}/export/ctf01d:
    post:
      operationId: exportCtf01d
      tags:
        - games
      summary: Export game as ctf01d zip archive
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Ctf01dExportRequest'
      responses:
        '200':
          description: ctf01d zip archive
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '422':
          description: Export validation errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ctf01dExportError'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Export game as ctf01d zip archive
  /games/{id}/teams:
    get:
      operationId: listGameTeams
      tags:
        - game-teams
      summary: List teams in a game
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of game teams
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameTeamList'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: List teams in a game
  /game-teams:
    post:
      operationId: createGameTeam
      tags:
        - game-teams
      summary: Add a team to a game
      x-required-role: player
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameTeamCreate'
      responses:
        '201':
          description: Game team created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameTeam'
        '409':
          $ref: '#/components/responses/Conflict'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Add a team to a game
  /game-teams/{id}:
    patch:
      operationId: updateGameTeam
      tags:
        - game-teams
      summary: Update a game team entry
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameTeamUpdate'
      responses:
        '200':
          description: Game team updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameTeam'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Update a game team entry
    delete:
      operationId: deleteGameTeam
      tags:
        - game-teams
      summary: Remove a team from a game
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Game team deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Remove a team from a game
  /games/{id}/teams/reorder:
    post:
      operationId: reorderGameTeams
      tags:
        - game-teams
      summary: Reorder teams in a game
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderRequest'
      responses:
        '200':
          description: Teams reordered
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Reorder teams in a game
  /results:
    get:
      operationId: listResults
      tags:
        - results
      summary: List results
      security:
        - BearerAuth: []
      parameters:
        - name: game_id
          in: query
          schema:
            type: integer
            format: int64
        - name: team_id
          in: query
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: List results
    post:
      operationId: createResult
      tags:
        - results
      summary: Create a result
      x-required-role: player
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResultCreate'
      responses:
        '201':
          description: Result created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Create a result
  /results/{id}:
    get:
      operationId: getResult
      tags:
        - results
      summary: Get a result by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Result details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Get a result by ID
    patch:
      operationId: updateResult
      tags:
        - results
      summary: Update a result
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResultUpdate'
      responses:
        '200':
          description: Result updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Update a result
    delete:
      operationId: deleteResult
      tags:
        - results
      summary: Delete a result
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Result deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Delete a result
  /games/{id}/scoreboard:
    get:
      operationId: getGameScoreboard
      tags:
        - scoreboard
      summary: Get scoreboard for a game
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Game scoreboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scoreboard'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'
      description: Get scoreboard for a game
  /scoreboard:
    get:
      operationId: getGlobalScoreboard
      tags:
        - scoreboard
      summary: Get global scoreboard
      security: []
      responses:
        '200':
          description: Global scoreboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalScoreboard'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Get global scoreboard
  /services:
    get:
      operationId: listServices
      tags:
        - services
      summary: List services
      security: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: public
          in: query
          schema:
            type: boolean
        - name: q
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of services
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: List services
    post:
      operationId: createService
      tags:
        - services
      summary: Create a service
      x-required-role: player
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceCreate'
      responses:
        '201':
          description: Service created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Create a service
  /services/{id}:
    get:
      operationId: getService
      tags:
        - services
      summary: Get a service by ID
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Service details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: Get a service by ID
    patch:
      operationId: updateService
      tags:
        - services
      summary: Update a service
      x-required-role: player
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceUpdate'
      responses:
        '200':
          description: Service updated
          content:
            application/json:
              schema:
